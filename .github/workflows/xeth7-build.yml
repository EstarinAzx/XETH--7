name: XETH--7 Build & Release

on:
  push:
    branches:
      - xeth-7-dev
      - main
  workflow_dispatch:

concurrency:
  group: xeth7-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            artifact: xeth7-linux-x64
          - os: windows-latest
            platform: win-x64
            artifact: xeth7-win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          cp dist/cli.mjs release/xeth7.mjs
          cp package.json release/
          echo '#!/usr/bin/env node' > release/xeth7
          echo 'import "./cli.mjs"' >> release/xeth7
          # Create a simple install script
          cat > release/install.sh << 'EOF'
          #!/bin/bash
          set -e
          INSTALL_DIR="${HOME}/.local/bin"
          mkdir -p "$INSTALL_DIR"
          cp xeth7.mjs "$INSTALL_DIR/"
          cp xeth7 "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/xeth7"
          echo "XETH--7 installed to $INSTALL_DIR/xeth7"
          echo "Make sure $INSTALL_DIR is in your PATH"
          EOF
          chmod +x release/install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/xeth-7-dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            tar -czf "../${name}.tar.gz" -C "$dir" .
          done

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Create or update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.version.outputs.version }}
          name: "XETH--7 dev build v${{ steps.version.outputs.version }} (${{ steps.sha.outputs.short }})"
          body: |
            ## XETH--7 Development Build

            **Branch:** `xeth-7-dev`
            **Commit:** `${{ github.sha }}`
            **Built:** ${{ github.event.head_commit.timestamp }}

            ### Installation

            **Linux/macOS:**
            ```bash
            # Download and extract
            curl -L https://github.com/${{ github.repository }}/releases/download/dev-${{ steps.version.outputs.version }}/xeth7-linux-x64.tar.gz | tar xz
            # Install
            bash install.sh
            ```

            **Windows:**
            Download `xeth7-win-x64.tar.gz`, extract, and run with `node xeth7.mjs`

            **Direct run (any platform with Node.js + Bun):**
            ```bash
            node xeth7.mjs
            ```
          files: |
            xeth7-linux-x64.tar.gz
            xeth7-win-x64.tar.gz
          prerelease: true
          make_latest: false
